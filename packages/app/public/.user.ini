; ─────────────────────────────────────────────────────────────────────────────
; .user.ini — PHP per-directory configuration for Corexpress
;
; PHP reads this file automatically in shared hosting environments.
; This is the standard way to configure PHP on Hostinger without root access.
;
; NOTE: Changes take effect after PHP's user_ini.cache_ttl (default 300 sec).
; On Hostinger you may need to restart PHP-FPM or wait ~5 minutes.
; ─────────────────────────────────────────────────────────────────────────────

; ── File uploads ─────────────────────────────────────────────────────────────
; The app enforces a 10 MB limit in code (ImageController::MAX_FILE_SIZE).
; These PHP-level limits must be HIGHER so PHP doesn't reject the request
; before it reaches the controller (which causes the generic "no file" error).
upload_max_filesize = 20M
post_max_size       = 22M

; ── Memory ───────────────────────────────────────────────────────────────────
memory_limit = 128M

; ── Execution ────────────────────────────────────────────────────────────────
max_execution_time = 60
max_input_time     = 60
